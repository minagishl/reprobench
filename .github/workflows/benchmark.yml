name: Benchmark

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  benchmark:
    name: Run & Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix develop --command pnpm install --frozen-lockfile
      - run: nix develop --command pnpm build
      - name: Run benchmark
        run: nix develop --command bash -c "cd examples/simple && node ../../dist/cli.js run"
      - name: Guard against regressions
        run: nix develop --command bash -c "cd examples/simple && node ../../dist/cli.js guard"
      - name: Generate report
        run: nix develop --command bash -c "cd examples/simple && node ../../dist/cli.js report"
      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-report
          path: examples/simple/report.md
      - name: Run benchmark via nix manager
        run: nix develop --command bash -c "cd examples/simple-nix && node ../../dist/cli.js run"
      - name: Guard via nix manager
        run: nix develop --command bash -c "cd examples/simple-nix && node ../../dist/cli.js guard"
